            // assignment 3
            function capitalize (str) {
                
                return str[0].toUpperCase() + str.substring(1).toLowerCase();
            }

            console.log(capitalize("abcd"))
            console.log(capitalize("ABCD"))
            console.log(capitalize("aBcD"))
