        <script>
            // Task: Array operations

            // Task: Sum input numbers
            function sumInput() {
                let sum = 0
                
                do {
                    input = Number(prompt("enter the valid number"))

                    if (!Number.isFinite(input)) {
                        return sum
                    } else {
                        sum += input;
                    }
                } while (Number.isFinite(input))
            }

            // console.log(sumInput())


            // Task: A maximal subarray
            /* 
            getMaxSubSum([-1, 2, 3, -9]) == 5 (the sum of highlighted items)
            getMaxSubSum([2, -1, 2, 3, -9]) == 6
            getMaxSubSum([-1, 2, 3, -9, 11]) == 11
            getMaxSubSum([-2, -1, 1, 2]) == 3
            getMaxSubSum([100, -9, 2, -3, 5]) == 100
            getMaxSubSum([1, 2, 3]) == 6 (take all)
            */
            let arr = [-1, 2, 3, -9];
            let arr2 = [2, -1, 2, 3, -9];
            let arr3 = [-1, 2, 3, -9, 11];
            let arr4 = [-2, -1, 1, 2];
            let arr5 = [100, -9, 2, -3, 5];
            let arr6 = [1, 2, 3];

            function getMaxSubSum(array) {
                // use kaneda's algo
                maxSub = 0
                curSum = 0

                for (const i of array) {
                    if (curSum < 0) {
                        curSum = 0
                    }
                    curSum += i
                    maxSub = Math.max(maxSub, curSum)
                }

                return maxSub
            }

            console.log(getMaxSubSum(arr))
            console.log(getMaxSubSum(arr2))
            console.log(getMaxSubSum(arr3))
            console.log(getMaxSubSum(arr4))
            console.log(getMaxSubSum(arr5))
            console.log(getMaxSubSum(arr6))

            // practice
            function sumOfTripledEvens(array) {
                // Step 1: If the element is an even number
                const even = array.filter((num) => num % 2 == 0)
                // Step 2: Multiply this number by three
                const tripleEvenNumber = even.map((num) => num * 3)
                // Step 3: Add the new number to the total
                const sum = tripleEvenNumber.reduce((total,currentItem) => total += currentItem, 0)
                
                return sum;
            }

            const example = [2, 4, 6, 7, 0];
            console.log(sumOfTripledEvens(example)); // Outputs [2, 3, 4, 5, 6]

        </script>
