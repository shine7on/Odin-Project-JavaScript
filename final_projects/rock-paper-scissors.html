<!DOCTYPE html>
<html lang="en">
    <head>

    </head>
    <body>

        <button name="rock">Rock</button>
        <button name="paper">Paper</button>
        <button name="scissors">Scissors</button>

        <script>
            function getComputerChoice() {
                let num = Math.floor(Math.random() * 3);

                switch(num) {
                    case 0:
                        return 'rock';
                    case 1:
                        return 'paper';
                    case 2:
                        return 'scissors'
                }
            }

            function getHumanChoice() {
                let choice = prompt("Enter rock or paper or scissors: ")
                return choice
            }

            let humanScore = 0
            let computerScore = 0
            

            function playGame () {

                const bodys = document.querySelector('body');
                const result = document.createElement('div');
                const scores = document.createElement('div');
                const winner = document.createElement('div');

                bodys.appendChild(result);
                bodys.appendChild(scores);
                bodys.appendChild(winner);

                const buttons = document.querySelectorAll('button');

                buttons.forEach(button => {
                    button.addEventListener('click', (event) => {
                        event.preventDefault();

                        const humanChoice = button.name;

                        playRound(getComputerChoice(), humanChoice)

                    });
                });

                function playRound (computerChoice, humanChoice) {
                    winner.textContent = ``;

                    let isHumanWin = 0 // -1: tie, 0: lose, 1:win

                    if (computerChoice == humanChoice) {
                        isHumanWin = -1
                        result.textContent = `Tie ${humanChoice}`;
                    } else if (computerChoice == 'rock' && humanChoice == 'paper' || 
                            computerChoice == 'paper' && humanChoice == 'scissors' ||
                            computerChoice == 'scissors' && humanChoice == 'rock') {
                        isHumanWin = 1;
                        result.textContent = `You win! Human: ${humanChoice} beats computer: ${computerChoice}`;
                    } else {
                        result.textContent = `You lose! Computer: ${computerChoice} beats human: ${humanChoice}`;
                    }

                    if (isHumanWin == 1) {
                        humanScore++;
                    } else if (isHumanWin == 0) {
                        computerScore++;
                    }
                    scores.textContent = `Human Score: ${humanScore} vs Computer Score: ${computerScore}`;

                    if (humanScore >= 5) {
                        winner.textContent = `Human win`;
                        humanScore = 0;
                        computerScore = 0;
                    } else if (computerScore >= 5) {
                        winner.textContent = `Computer win`;
                        humanScore = 0;
                        computerScore = 0;
                    }
                }
            }

            playGame()
            

        </script>
    </body>
</html>
