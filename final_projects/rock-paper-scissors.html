    <body>
        <script>
            function getComputerChoice() {
                let num = Math.floor(Math.random() * 3);

                console.log(num)

                switch(num) {
                    case 0:
                        return 'rock';
                    case 1:
                        return 'paper';
                    case 2:
                        return 'scissors'
                }
            }

            function getHumanChoice() {
                let choice = prompt("Enter rock or paper or scissors: ")
                return choice
            }

            /*

            const humanSelection = getHumanChoice();
            const computerSelection = getComputerChoice();
            console.log(computerSelection, humanSelection);

            playRound(computerSelection, humanSelection);

            */


            function playGame () {

                let humanScore = 0
                let computerScore = 0

                function playRound (computerChoice, humanChoice) {
                    humanChoice = humanChoice.toLowerCase();

                    let isHumanWin = 0 // -1: tie, 0: lose, 1:win

                    if (computerChoice == humanChoice) {
                        isHumanWin = -1
                        console.log(`tie ${humanChoice}`)
                    } else if (computerChoice == 'rock' && humanChoice == 'paper' || 
                            computerChoice == 'paper' && humanChoice == 'scissors' ||
                            computerChoice == 'scissors' && humanChoice == 'rock') {
                        isHumanWin = 1;
                        console.log(`You win! Human: ${humanChoice} beats computer: ${computerChoice}`);
                    } else {
                        console.log(`You lose! Computer: ${computerChoice} beats human: ${humanChoice}`);
                    }

                    if (isHumanWin == 1) {
                        humanScore++;
                    } else if (isHumanWin == 0) {
                        computerScore++;
                    }
                }

                for (let i=0; i<5; i++) {
                    let humanSelection = getHumanChoice();
                    let computerSelection = getComputerChoice();
                    playRound(computerSelection, humanSelection)
                }
            }

            playGame()
            

        </script>
    </body>
</html>
